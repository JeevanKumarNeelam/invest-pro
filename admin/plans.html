<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Investment Plans</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Invest<span>Pro</span></h2>
                <p>Administrator Panel</p>
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-link">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="recharge.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>Recharge Requests</span>
                </a>
                <a href="withdraw.html" class="nav-link">
                    <i class="fas fa-arrow-up"></i>
                    <span>Withdraw Requests</span>
                </a>
                <a href="plans.html" class="nav-link active">
                    <i class="fas fa-chart-simple"></i>
                    <span>Investment Plans</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1>Investment Plans</h1>
                <div class="admin-info">
                    <span>Administrator</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>

            <div class="add-plan-section">
                <button class="add-plan-btn" onclick="openAddPlanModal('silver')">
                    <i class="fas fa-plus"></i> Add New Plan
                </button>
            </div>

            <div class="plans-grid" id="plansGrid"></div>
        </div>
    </div>

    <!-- Plan Modal -->
    <div id="planModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="planModalTitle">Add New Plan</h3><span class="close-btn" onclick="closePlanModal()">&times;</span></div>
            <div class="modal-body">
                <input type="hidden" id="planId">
                <div class="input-group"><label>Plan Name</label><input type="text" id="planName" placeholder="Enter plan name"></div>
                <div class="input-group"><label>Category</label><select id="planCategory"><option value="silver">Silver</option><option value="gold">Gold</option><option value="platinum">Platinum</option></select></div>
                <div class="input-group"><label>Minimum Investment (₹)</label><input type="number" id="planMin" placeholder="Enter minimum amount"></div>
                <div class="input-group"><label>Expected Returns (%)</label><input type="text" id="planReturns" placeholder="e.g., 8-10%"></div>
                <div class="input-group"><label>Duration</label><input type="text" id="planDuration" placeholder="e.g., 30 days"></div>
                <div class="input-group"><label>Risk Level</label><select id="planRisk"><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select></div>
            </div>
            <div class="modal-footer"><button class="cancel-btn" onclick="closePlanModal()">Cancel</button><button class="save-btn" onclick="savePlan()">Save Plan</button></div>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
