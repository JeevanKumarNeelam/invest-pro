<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin - Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Invest<span>Pro</span></h2>
                <p>Administrator Panel</p>
            </div>
            <div class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-link active">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </a>
                <a href="recharge.html" class="nav-link">
                    <i class="fas fa-wallet"></i>
                    <span>Recharge Requests</span>
                </a>
                <a href="withdraw.html" class="nav-link">
                    <i class="fas fa-arrow-up"></i>
                    <span>Withdraw Requests</span>
                </a>
                <a href="plans.html" class="nav-link">
                    <i class="fas fa-chart-simple"></i>
                    <span>Investment Plans</span>
                </a>
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="adminLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <div class="admin-main">
            <div class="admin-header">
                <h1>Manage Users</h1>
                <div class="admin-info">
                    <span>Administrator</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Full Name</th><th>Mobile</th><th>Wallet</th><th>Invested</th><th>Joined</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Edit User</h3><span class="close-btn" onclick="closeEditModal()">&times;</span></div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="input-group"><label>Full Name</label><input type="text" id="editFullName"></div>
                <div class="input-group"><label>Mobile Number</label><input type="tel" id="editMobile" readonly></div>
                <div class="input-group"><label>Wallet Balance</label><input type="number" id="editWalletBalance"></div>
                <div class="input-group"><label>Total Invested</label><input type="number" id="editTotalInvested"></div>
                <div class="input-group"><label>Total Returns</label><input type="number" id="editTotalReturns"></div>
            </div>
            <div class="modal-footer"><button class="cancel-btn" onclick="closeEditModal()">Cancel</button><button class="save-btn" onclick="saveUserEdit()">Save Changes</button></div>
        </div>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
