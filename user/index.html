<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InvestPro - Login</title>
    <link rel="stylesheet" href="css/login.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    
    <div class="form-box">
        <h1 class="logo">InvestPro</h1>
        <p class="tagline">Secure Investment Platform</p>

        <h2>Login to your account</h2>

        <form id="loginForm">

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" maxlength="10" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fa-regular fa-eye-slash toggle-password" data-target="password"></i>
                </div>
            </div>

            <button type="submit">Login</button>

        </form>

        <p class="link">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
