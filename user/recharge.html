<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InvestPro - Recharge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/recharge.css">
</head>
<body>
    <div class="app-container">
        <div class="content-area">
            <div class="page-header">
                <div class="back-btn" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <h2>Add Funds</h2>
            </div>
            
            <div class="amount-input">
                <label>Enter Amount</label>
                <input type="number" id="amount" placeholder="₹ 0" value="1000">
                <div class="amount-buttons">
                    <button class="amount-preset" onclick="setAmount(500)">₹500</button>
                    <button class="amount-preset" onclick="setAmount(1000)">₹1,000</button>
                    <button class="amount-preset" onclick="setAmount(5000)">₹5,000</button>
                    <button class="amount-preset" onclick="setAmount(10000)">₹10,000</button>
                </div>
            </div>
            
            <div class="payment-methods">
                <h3>Payment Method</h3>
                <div class="payment-method selected" data-method="giftcard">
                    <i class="fas fa-gift"></i>
                    <span>Gift Card</span>
                </div>
            </div>
            
            <button class="recharge-btn" onclick="openRechargeModal()">Proceed to Pay</button>
        </div>
    </div>

    <!-- Modal Popup for Gift Card Details -->
    <div id="rechargeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Gift Card Details</h3>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="modalMobile" placeholder="Enter 10-digit mobile number" maxlength="10">
                </div>
                <div class="input-group">
                    <label>Gift Card Code</label>
                    <input type="text" id="giftCardCode" placeholder="Enter gift card code">
                </div>
                <div class="input-group">
                    <label>Gift Card Value</label>
                    <input type="number" id="giftCardValue" placeholder="Enter gift card value">
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="submit-btn" onclick="submitRechargeRequest()">Recharge</button>
            </div>
        </div>
    </div>

    <!-- Success Popup -->
    <div id="successPopup" class="success-popup">
        <div class="success-content">
            <i class="fas fa-check-circle"></i>
            <h3>Recharge Request Sent!</h3>
            <p>Your recharge request has been submitted successfully.</p>
            <p>Please wait for admin approval. It will be processed within 10-15 minutes.</p>
            <button onclick="closeSuccessPopup()">OK</button>
        </div>
    </div>

    <script src="js/recharge.js"></script>
</body>
</html>
