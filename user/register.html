<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InvestPro - Register</title>
    <link rel="stylesheet" href="css/register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    
    <div class="form-box">
        <h1 class="logo">InvestPro</h1>
        <p class="tagline">Secure Investment Platform</p>

        <h2>Create your account</h2>

        <form id="registerForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
                <span class="error-text" id="nameError"></span>
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" maxlength="10" required>
                <span class="error-text" id="mobileError"></span>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Create password (min 6 characters)" required>
                    <i class="fa-regular fa-eye-slash toggle-password" data-target="password"></i>
                </div>
                <span class="error-text" id="passwordError"></span>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    <i class="fa-regular fa-eye-slash toggle-password" data-target="confirmPassword"></i>
                </div>
                <span class="error-text" id="confirmError"></span>
            </div>

            <div class="input-group">
                <label>Withdrawal Password</label>
                <div class="password-wrapper">
                    <input type="password" id="withdrawalPassword" placeholder="4-6 digit withdrawal password" maxlength="6" required>
                    <i class="fa-regular fa-eye-slash toggle-password" data-target="withdrawalPassword"></i>
                </div>
                <span class="error-text" id="withdrawalError"></span>
                <small style="font-size: 11px; color: #64748b;">Used for withdrawal transactions</small>
            </div>

            <div class="input-group">
                <label>Invitation Code <span style="font-weight: normal; color: #94a3b8;">(Optional)</span></label>
                <input type="text" id="invitationCode" placeholder="Enter invitation code if you have one">
            </div>

            <button type="submit">Register</button>

        </form>

        <p class="link">
            Already have an account? <a href="index.html">Login</a>
        </p>
    </div>

</div>

<script src="js/register.js"></script>
</body>
</html>
